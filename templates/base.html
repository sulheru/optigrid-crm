{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}OptiGrid CRM{% endblock %}</title>

  <link rel="stylesheet" href="{% static 'app_ui/css/bootstrap.min.css' %}">
  <link rel="stylesheet" href="{% static 'app_ui/css/font-awesome.css' %}">
  <link rel="stylesheet" href="{% static 'app_ui/css/style.css' %}">
  <link rel="stylesheet" href="{% static 'app_ui/css/custom.css' %}">

  <style>
    html, body {
      background: #f2f4f8;
      min-height: 100%;
    }

    body {
      font-family: 'Roboto', sans-serif;
      color: #1f2937;
    }

    .app-shell {
      min-height: 100vh;
      background: #f2f4f8;
    }

    .app-sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 250px;
      height: 100vh;
      overflow-y: auto;
      background: #0f172a;
      color: #cbd5e1;
      z-index: 1000;
      box-shadow: 2px 0 12px rgba(0,0,0,0.08);
    }

    .app-sidebar-brand {
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .app-brand-link {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      text-decoration: none;
    }

    .app-brand-link:hover,
    .app-brand-link:focus {
      color: #fff;
      text-decoration: none;
    }

    .app-brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .app-brand-logo img {
      max-width: 24px;
      max-height: 24px;
      display: block;
    }

    .app-brand-text {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .app-sidebar-section {
      padding: 18px 14px 0;
    }

    .app-sidebar-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #64748b;
      margin: 0 10px 10px;
    }

    .app-nav {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .app-nav-item {
      margin-bottom: 4px;
    }

    .app-nav-item a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 12px;
      border-radius: 10px;
      color: #cbd5e1;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .app-nav-item a:hover,
    .app-nav-item a:focus {
      text-decoration: none;
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .app-nav-item.active a {
      background: rgb(6, 217, 149);
      color: #fff;
      box-shadow: 0 6px 18px rgba(6, 217, 149, 0.25);
    }

    .app-nav-item i {
      width: 18px;
      text-align: center;
      font-size: 15px;
    }

    .app-main {
      margin-left: 250px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-topbar {
      position: sticky;
      top: 0;
      z-index: 900;
      height: 72px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .app-topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .app-nav-toggle {
      display: none;
      width: 40px;
      height: 40px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      background: #fff;
      color: #111827;
    }

    .app-page-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.1;
      color: #111827;
      font-weight: 600;
    }

    .app-page-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: #6b7280;
    }

    .app-topbar-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      color: #374151;
      font-size: 13px;
      font-weight: 500;
    }

    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgb(6, 217, 149);
      display: inline-block;
      box-shadow: 0 0 0 4px rgba(6, 217, 149, 0.12);
    }

    .app-content {
      padding: 24px;
      flex: 1;
    }

    .app-section-title {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      color: #111827;
    }

    .app-section-subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: #6b7280;
    }

    .app-kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .app-kpi-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
    }

    .app-kpi-value {
      font-size: 30px;
      font-weight: 700;
      color: #111827;
      line-height: 1;
      margin-bottom: 8px;
    }

    .app-kpi-label {
      font-size: 13px;
      color: #6b7280;
    }

    @media (max-width: 1024px) {
      .app-kpi-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 768px) {
      .app-sidebar {
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      .app-shell.sidebar-open .app-sidebar {
        transform: translateX(0);
      }

      .app-main {
        margin-left: 0;
      }

      .app-nav-toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .app-topbar {
        padding: 0 16px;
      }

      .app-content {
        padding: 16px;
      }

      .app-kpi-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  {% include "partials/design_system.html" %}
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="app-shell" id="app-shell">
    {% include "partials/app_sidebar.html" %}

    <div class="app-main">
      {% include "partials/app_topbar.html" %}

      <main class="app-content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </div>

  <script src="{% static 'app_ui/js/jquery.min.js' %}"></script>
  <script src="{% static 'app_ui/js/bootstrap.min.js' %}"></script>
  <script src="{% static 'app_ui/js/metisMenu.min.js' %}"></script>

  <script>
    (function () {
      var shell = document.getElementById('app-shell');
      var toggle = document.querySelector('.js-nav-toggle');

      if (toggle && shell) {
        toggle.addEventListener('click', function () {
          shell.classList.toggle('sidebar-open');
        });
      }
    })();
  </script>

  {% block extra_js %}{% endblock %}
</body>
</html>
