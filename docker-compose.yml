version: "3.9"

services:

  db:
    image: postgres:16
    container_name: optigrid_db
    restart: always
    environment:
      POSTGRES_DB: optigrid
      POSTGRES_USER: optigrid
      POSTGRES_PASSWORD: optigrid
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: optigrid_redis
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: optigrid_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build: .
    container_name: optigrid_worker
    command: celery -A config worker -l info
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

volumes:
  postgres_data:

